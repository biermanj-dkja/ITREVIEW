module_id: module_1
module_name: Small Private School IT Overview and Action Plan
version: "0.2"
target_audience: School IT Director or Technology Coordinator
description: >
  A structured assessment of a small private school's IT environment,
  producing a deterministic action plan and findings report.

sections:

# ─────────────────────────────────────────────────────────────────
# SECTION 1: School Identity, Profile, and Context (~3 min)
# ─────────────────────────────────────────────────────────────────
  - section_id: "1"
    title: School Identity, Profile, and Context
    estimated_minutes: 3
    description: >
      Capture baseline organizational context used to tailor findings,
      recommendations, and calendar items. This section is context only —
      no scored questions.
    order: 1
    questions:
      - question_id: "1.1"
        prompt: School name
        help_text: The full legal name of the school as it should appear on the report.
        answer_type: short_text
        status: core
        skippable: true
        prefill: school_name
        points: 0
        condition: null

      - question_id: "1.2"
        prompt: School address
        help_text: Primary campus address.
        answer_type: short_text
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.3"
        prompt: Main school phone number
        help_text: Primary contact phone number for the school.
        answer_type: short_text
        status: optional
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.4"
        prompt: School website
        help_text: The school's domain or website address, e.g. stmarks.org or ehillel.org.
        answer_type: short_text
        status: core
        skippable: true
        prefill: school_website
        points: 0
        condition: null

      - question_id: "1.5"
        prompt: School mission statement
        help_text: Optional. Used for narrative context in the report. Paste or type the mission statement if you have it handy.
        answer_type: long_text
        status: optional
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.6"
        prompt: Does the school have an official logo or crest available for use in the report?
        help_text: "If yes, note where the file is located. File upload support is coming in a later update."
        answer_type: yes_no_unknown
        status: optional
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.7a"
        prompt: Name of the person creating this report
        help_text: e.g. Alex Smith. This appears in the report metadata and appendix.
        answer_type: short_text
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.7b"
        prompt: Role or title of the person creating this report
        help_text: e.g. Director of Technology, IT Coordinator, Head of IT.
        answer_type: short_text
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.8"
        prompt: How many sites or campuses are supported?
        help_text: Count each physically separate campus or location. A main campus plus an athletics campus = 2.
        answer_type: count
        status: core
        skippable: true
        triggers_save: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.9"
        prompt: How many buildings are supported in total?
        help_text: Count across all sites. Include any building that has IT infrastructure or users.
        answer_type: count
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.10"
        prompt: How many buildings are located at each site?
        help_text: "List each site and its building count. e.g. Main Campus — 4 buildings, Athletics Campus — 1 building"
        answer_type: list_of_items
        status: conditional
        skippable: true
        prefill: null
        points: 0
        condition:
          type: value_comparison
          question_id: "1.8"
          operator: greater_than
          value: 1

      - question_id: "1.11"
        prompt: What grades does the school serve?
        help_text: "e.g. PK-12 or K-8 or 9-12. List all grade levels served."
        answer_type: short_text
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.12"
        prompt: Approximate student enrollment
        help_text: Total number of enrolled students. An estimate is fine.
        answer_type: count
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.13"
        prompt: Approximate faculty and staff count
        help_text: Total number of faculty and staff. Include all employees who use school IT systems.
        answer_type: count
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.14"
        prompt: Approximate total managed devices
        help_text: Include all school-owned devices — laptops, desktops, tablets, printers, servers. Student take-home devices count if school-owned. An estimate is fine.
        answer_type: count
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "1.15"
        prompt: Which device categories are in scope for this assessment?
        help_text: Select all that apply. This determines which later questions are relevant to your environment.
        answer_type: multi_select
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null
        options:
          - Staff laptops or desktops
          - Student laptops or tablets
          - Servers (on-premises)
          - Printers and copiers
          - Network infrastructure (switches, APs, firewall)
          - Classroom AV and displays
          - Phone or voice systems
          - Cloud services only (no on-premises hardware)
          - Other

      - question_id: "1.16"
        prompt: What are the most important upcoming school calendar events that affect IT planning?
        help_text: >
          List events that will create IT demand or constrain IT work windows.
          e.g. Summer device refresh (June-July), Accreditation visit (March),
          New 6th grade 1:1 rollout (August). One item per line.
        answer_type: list_of_items
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

# ─────────────────────────────────────────────────────────────────
# SECTION 2: Governance, Budget, Staffing, and Ownership (~3 min)
# ─────────────────────────────────────────────────────────────────
  - section_id: "2"
    title: Governance, Budget, Staffing, and Ownership
    estimated_minutes: 3
    description: >
      Determine whether the environment has clear accountability for systems,
      vendors, credentials, recurring tasks, and spending.
    order: 2
    questions:
      - question_id: "2.1"
        prompt: What is the primary IT support model for this school?
        help_text: Choose the option that best describes how IT support is currently structured.
        answer_type: single_select
        status: core
        skippable: true
        triggers_save: true
        prefill: null
        points: 1
        condition: null
        options:
          - Internal IT staff (one or more dedicated IT employees)
          - Single IT director (one person responsible for everything)
          - Outsourced MSP (managed service provider handles IT)
          - Hybrid — internal staff plus MSP
          - Volunteer or ad hoc support (no dedicated IT role)
          - Other

      - question_id: "2.1b"
        prompt: You selected "Other" — please describe the support model briefly
        help_text: "e.g. Part-time contractor or Shared IT with a sister school."
        answer_type: short_text
        status: conditional
        skippable: true
        prefill: null
        points: 0
        condition:
          type: answer_is
          question_id: "2.1"
          value: "Other"

      - question_id: "2.2"
        prompt: Is there a named person primarily responsible for IT leadership?
        help_text: Someone whose job — formally or informally — is to be accountable for IT decisions and outcomes.
        answer_type: yes_no_unknown
        status: core
        skippable: true
        triggers_save: true
        prefill: null
        points: 5
        condition: null

      - question_id: "2.2b"
        prompt: What is that person's name and title?
        help_text: "e.g. Alex Smith, Director of Technology. This appears in the report and appendix."
        answer_type: short_text
        status: conditional
        skippable: true
        prefill: null
        points: 0
        condition:
          type: answer_is
          question_id: "2.2"
          value: "yes"

      - question_id: "2.3"
        prompt: Are day-to-day IT support responsibilities clearly assigned?
        help_text: Is it clear who handles help desk requests, device issues, account problems, and classroom tech support?
        answer_type: yes_no_unknown
        status: core
        skippable: true
        prefill: null
        points: 4
        condition: null

      - question_id: "2.4"
        prompt: Is there a documented list of system owners for major platforms and services?
        help_text: A record that says who is accountable for each major system — SIS, LMS, email, network, etc.
        answer_type: yes_no_unknown
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null

      - question_id: "2.5"
        prompt: Is there a documented list of vendor contacts and escalation paths?
        help_text: A record of who to call at each key vendor when something goes wrong — including contract or account numbers.
        answer_type: yes_no_unknown
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null

      - question_id: "2.6"
        prompt: Does the IT function have a formal budget?
        help_text: A planned allocation of funds for IT spending that is reviewed and approved by leadership.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 2
        condition: null
        options:
          - Yes — formal annual budget
          - Yes — but informal or ad hoc
          - "No"

      - question_id: "2.7"
        prompt: Are there known budget or staffing constraints affecting IT work this year?
        help_text: >
          e.g. a hiring freeze, a budget cut, an open position, or a cap on spending.
          If yes, briefly describe in the notes field — this helps calibrate recommendations.
        answer_type: yes_no_unknown
        status: core
        skippable: true
        prefill: null
        points: 1
        has_notes: true
        condition: null

      - question_id: "2.8"
        prompt: Are emergency access methods and credentials documented and controlled?
        help_text: >
          Break-glass accounts, master admin credentials, emergency recovery account access —
          is there a documented, secure record of these that someone other than
          the primary IT person can access in an emergency?
        answer_type: yes_no_unknown
        status: core
        skippable: true
        prefill: null
        points: 5
        condition: null

      - question_id: "2.9"
        prompt: If the primary IT lead were unavailable for two weeks, could another person reasonably maintain operations?
        help_text: Think about a scenario like unexpected illness or a sudden departure. Could someone else keep the lights on?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 4
        condition: null
        options:
          - Yes — another person could cover fully
          - Partially — some things would be managed, others would not
          - No — operations would be significantly disrupted

      - question_id: "2.10"
        prompt: Are recurring IT tasks tracked on a calendar, checklist, or ticketing system?
        help_text: >
          Things like monthly backup reviews, quarterly admin audits, annual firmware reviews,
          and renewal reminders. Is there a system that ensures these happen reliably?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 2
        condition: null
        options:
          - Yes — fully tracked in a system
          - Partially — some tasks tracked, others rely on memory
          - No — relies on memory or informal reminders

      - question_id: "2.11"
        prompt: Is there a ticketing system for IT support requests?
        help_text: A system where staff can log IT issues and track their resolution — even a simple free tool counts.
        answer_type: single_select
        status: optional
        skippable: true
        prefill: null
        points: 1
        condition: null
        options:
          - Yes — in regular active use
          - Yes — but limited or inconsistent use
          - "No"

      - question_id: "2.12"
        prompt: Who has authority to approve new software or digital tools for classroom use?
        help_text: This affects student data handling and IT support obligations. Choose the option that best describes how approval decisions are made.
        answer_type: single_select
        status: optional
        skippable: true
        prefill: null
        points: 1
        condition: null
        options:
          - IT director or technology coordinator
          - Ed tech director or academic technology lead
          - Principal or head of school
          - No single person — decisions are made ad hoc

# ─────────────────────────────────────────────────────────────────
# SECTION 3: Sites, Buildings, Network, and Internet (~5 min)
# ─────────────────────────────────────────────────────────────────
  - section_id: "3"
    title: Sites, Buildings, Network, and Internet
    estimated_minutes: 5
    description: >
      Establish the physical shape, dependencies, equipment profile, and
      documentation status of the network environment.
    order: 3
    questions:
      - question_id: "3.1"
        prompt: Do you have digital blueprints, floor plans, or building maps for the school facilities?
        help_text: Even rough sketches or PDFs count. These are used to document wireless AP locations and network closet positions.
        answer_type: single_select
        status: optional
        skippable: true
        prefill: null
        points: 1
        condition: null
        options:
          - Yes — current and reasonably accurate
          - Partial — some buildings or areas covered
          - "No"

      - question_id: "3.2"
        prompt: Is there a current network diagram?
        help_text: A diagram showing the logical and/or physical layout of the network — internet connection, firewall, switches, wireless, and servers.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — current and accurate
          - Yes — but outdated
          - "No"

      - question_id: "3.3"
        prompt: Is there a site map or closet/rack map for each campus or building?
        help_text: A physical map showing where network equipment is installed — closets, racks, patch panels, cable runs.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — current for all locations
          - Partial — some locations documented
          - "No"

      - question_id: "3.4"
        prompt: Do you know where the wireless access points are physically located throughout the school?
        help_text: Could you walk a map and point to each AP location?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — all locations are known and documented
          - Partial — most are known, some are not
          - "No"

      - question_id: "3.5"
        prompt: What wireless access point platform or brand is used?
        help_text: "e.g. Ubiquiti, Aruba, Cisco Meraki, Ruckus, Extreme. If mixed, list the primary platforms."
        answer_type: short_text
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "3.6"
        prompt: Are wireless access points inventoried with model and firmware information?
        help_text: A record of each AP including model number, current firmware version, and physical location.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — current inventory with model and firmware
          - Partial — some information documented
          - "No"

      - question_id: "3.7"
        prompt: Does the school have a firewall?
        help_text: A dedicated firewall appliance or service — not just a consumer router.
        answer_type: yes_no_unknown
        status: core
        skippable: true
        triggers_save: true
        prefill: null
        points: 5
        has_notes: false
        is_gate: true
        gate_negative_values:
          - "no"
          - "unknown"
        condition: null

      - question_id: "3.7b"
        prompt: What firewall platform or brand is in use?
        help_text: "e.g. Fortinet, Palo Alto, Sophos, pfSense, Cisco Meraki, Ubiquiti."
        answer_type: short_text
        status: conditional
        skippable: true
        prefill: null
        points: 0
        condition:
          type: answer_is
          question_id: "3.7"
          value: "yes"

      - question_id: "3.8"
        prompt: What primary brand or platform is used for the wired network infrastructure?
        help_text: "e.g. Cisco Meraki, Ubiquiti, HP/Aruba, Netgear. Include switches and any management platform."
        answer_type: short_text
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "3.9"
        prompt: Are switches inventoried with model and firmware information?
        help_text: A record of each switch including model, firmware version, and location.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — current inventory with model and firmware
          - Partial — some information documented
          - "No"

      - question_id: "3.10"
        prompt: Is there a switch map showing how major switches connect to one another?
        help_text: A diagram or documented record showing the uplink relationships between switches and the path to the core.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — current and accurate
          - Partial — some connections documented
          - "No"

      - question_id: "3.11"
        prompt: Are core network devices inventoried with make, model, location, and support status?
        help_text: Core devices include the firewall, core switches, wireless controller, and any network management appliance.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — fully documented with support status
          - Partial — some information documented
          - "No"

      - question_id: "3.12"
        prompt: Do you have administrative access to the network infrastructure?
        help_text: Can you log into the firewall, switches, and wireless system with admin credentials that the school controls?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 5
        condition: null
        options:
          - Yes — full admin access to all infrastructure
          - Partial — admin access to some but not all devices
          - No — access is controlled by a vendor or MSP

      - question_id: "3.13"
        prompt: How many internet connections are in place?
        help_text: Count the number of separate ISP connections terminating at the school. Most small schools have one.
        answer_type: count
        status: core
        skippable: true
        prefill: null
        points: 1
        condition: null

      - question_id: "3.14"
        prompt: Who is the primary ISP or ISPs?
        help_text: "List the internet service provider(s). e.g. Comcast, Spectrum, AT&T Fiber, local provider."
        answer_type: list_of_items
        status: optional
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "3.15"
        prompt: Is there internet failover or redundancy?
        help_text: If the primary internet connection goes down, does traffic automatically or manually switch to a backup?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 2
        condition: null
        options:
          - Yes — load balancing and automatic failover to a secondary connection
          - Yes — automatic failover to a secondary connection
          - Yes — manual failover (requires someone to switch it)
          - No — single connection with no backup

      - question_id: "3.16"
        prompt: Does the school have static public IP addresses?
        help_text: Static IPs are relevant if the school hosts any services externally or has firewall rules tied to specific addresses.
        answer_type: single_select
        status: optional
        skippable: true
        triggers_save: true
        prefill: null
        points: 0
        condition: null
        options:
          - "Yes"
          - "No"

      - question_id: "3.16b"
        prompt: What are the static IP address ranges assigned to the school?
        help_text: List the ranges or individual addresses. This is context only and appears in the appendix.
        answer_type: short_text
        status: conditional
        skippable: true
        prefill: null
        points: 0
        condition:
          type: answer_is
          question_id: "3.16"
          value: "Yes"

      - question_id: "3.17"
        prompt: Are firewall platform, firmware status, and support or warranty status known?
        help_text: Do you know the firewall model, what firmware version it is running, and whether it is under active support?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition:
          type: answer_is
          question_id: "3.7"
          value: "yes"
        options:
          - Yes — fully known and documented
          - Partial — some information known
          - "No"

      - question_id: "3.18"
        prompt: Are switch and wireless configurations backed up regularly?
        help_text: If a switch or AP had to be replaced today, could its configuration be restored without rebuilding from scratch?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 5
        condition: null
        options:
          - Yes — configurations are backed up regularly
          - Partial — some devices backed up, others not
          - "No"

      - question_id: "3.19"
        prompt: Is wireless coverage known to be adequate in instructional and administrative areas?
        help_text: Are there known dead spots or areas where staff or students regularly experience poor Wi-Fi?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — coverage is adequate throughout
          - Mixed — some areas have coverage problems
          - No — coverage is a known problem

      - question_id: "3.20"
        prompt: Are network segments or VLAN purposes documented?
        help_text: If VLANs are in use, is there a record of what each segment is for and what devices belong to it?
        answer_type: single_select
        status: optional
        skippable: true
        prefill: null
        points: 2
        condition: null
        options:
          - Yes — all segments documented
          - Partial — some segments documented
          - "No"
          - Unknown — not sure if VLANs are in use

      - question_id: "3.21"
        prompt: Do network closets or server areas have battery backup or UPS protection for critical equipment?
        help_text: A UPS (uninterruptible power supply) keeps equipment running during brief outages and allows controlled shutdown.
        answer_type: single_select
        status: core
        skippable: true
        triggers_save: true
        prefill: null
        points: 2
        condition: null
        options:
          - Yes — fully protected
          - Partial — some equipment protected, some not
          - "No"

      - question_id: "3.22"
        prompt: Is UPS runtime for critical network or server equipment known?
        help_text: How long will the UPS keep equipment running under normal load? Is this tested or just estimated?
        answer_type: single_select
        status: conditional
        skippable: true
        prefill: null
        points: 1
        condition:
          type: answer_is
          question_id: "3.21"
          value:
            - Yes — fully protected
            - Partial — some equipment protected, some not
        options:
          - Yes — documented and tested
          - Estimated only — not formally tested
          - "No"

      - question_id: "3.23"
        prompt: Are UPS devices monitored or network-connected for alerting and status?
        help_text: Can the UPS send an alert if it is on battery power or if its battery health is degraded?
        answer_type: single_select
        status: optional
        skippable: true
        prefill: null
        points: 1
        condition: null
        options:
          - Yes — monitored with alerting
          - Partial — some monitored
          - "No"

      - question_id: "3.24"
        prompt: Is the network scanned or discovered regularly for connected devices?
        help_text: Is there a process — automated or manual — that identifies what devices are connected to the network?
        answer_type: single_select
        status: optional
        skippable: true
        triggers_save: true
        prefill: null
        points: 1
        condition: null
        options:
          - Yes — regularly scanned
          - Occasionally — ad hoc or infrequent
          - "No"

      - question_id: "3.25"
        prompt: How often is the network scanned or discovered?
        help_text: Select the closest match to the actual frequency.
        answer_type: single_select
        status: conditional
        skippable: true
        prefill: null
        points: 0
        condition:
          type: answer_is
          question_id: "3.24"
          value:
            - Yes — regularly scanned
            - Occasionally — ad hoc or infrequent
        options:
          - Continuously (automated monitoring)
          - Daily
          - Weekly
          - Monthly
          - Ad hoc — no regular schedule

      - question_id: "3.26"
        inverted: true
        prompt: Are there known connectivity pain points currently affecting school operations?
        help_text: >
          Areas with poor Wi-Fi, recurring outages, slow internet, or devices that cannot connect
          reliably. This is where you elaborate on any partial coverage or connectivity issues you
          may have mentioned earlier in this section — this is not a repeat question, it is asking
          for operational impact details. If yes, describe briefly in the notes field.
        answer_type: yes_no_unknown
        status: core
        skippable: true
        prefill: null
        points: 3
        has_notes: true
        condition: null

# ─────────────────────────────────────────────────────────────────
# SECTION 4: Identity, Accounts, and Access (~3 min)
# ─────────────────────────────────────────────────────────────────
  - section_id: "4"
    title: Identity, Accounts, and Access
    estimated_minutes: 3
    description: >
      Assess how accounts are managed, secured, and transitioned.
    order: 4
    questions:
      - question_id: "4.1"
        prompt: What is the primary productivity platform?
        help_text: The platform that provides email, file storage, and collaboration tools for staff and students.
        answer_type: single_select
        status: core
        skippable: true
        triggers_save: true
        prefill: null
        points: 1
        condition: null
        options:
          - Google Workspace
          - Microsoft 365
          - Hybrid — Google and Microsoft both in active use
          - Local or on-premises systems only
          - Other

      - question_id: "4.1b"
        prompt: Is that primary productivity platform also the primary online authentication and identity platform?
        help_text: >
