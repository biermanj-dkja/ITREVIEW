# ─────────────────────────────────────────────────────────────────
# SECTION 7: Data Protection, Backup, and Recovery (~3 min)
# ─────────────────────────────────────────────────────────────────
  - section_id: "7"
    title: Data Protection, Backup, and Recovery
    estimated_minutes: 3
    description: >
      Understand whether data protection exists, is documented, and can be
      relied upon during an incident.
    order: 7
    questions:
      - question_id: "7.1"
        prompt: Are backups in place for critical systems or data sets?
        help_text: >
          Choose the option that best reflects your actual confidence in the current backup status.
          This question controls the rest of this section — if you select No or Unknown,
          the remaining backup questions will be hidden because they will no longer be answerable.
          Save your progress after answering to see the full section.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 5
        is_gate: true
        gate_hides_unconditional: true
        gate_negative_values:
          - "No"
        condition: null
        options:
          - Yes — confirmed and verified
          - Maybe or assumed — believed to be in place but not verified
          - "No"

      - question_id: "7.2"
        prompt: What backup service or platform is currently used?
        help_text: "e.g. Veeam, Acronis, Backblaze, Datto, Druva, or a built-in cloud backup service."
        answer_type: short_text
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "7.3"
        prompt: Is there a documented list of what is backed up and what is not?
        help_text: A backup scope document prevents surprises during recovery — you need to know what is and is not protected before an incident, not during one.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 4
        condition: null
        options:
          - Yes — documented scope
          - Partial — some systems documented, others not
          - "No"

      - question_id: "7.4"
        prompt: Do backups cover servers?
        help_text: Are on-premises or self-managed servers included in the backup scope?
        answer_type: single_select
        status: conditional
        skippable: true
        prefill: null
        points: 5
        condition:
          type: value_comparison
          question_id: "6.13"
          operator: greater_than
          value: 0
        options:
          - Yes — all servers backed up
          - Partial — some servers backed up
          - "No"
          - Not applicable

      - question_id: "7.5"
        prompt: Do backups cover individual staff devices where appropriate?
        help_text: Staff devices that store locally-saved files, documents, or data that is not synced to cloud storage.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — staff devices are backed up
          - Partial — some staff devices backed up
          - "No"
          - Not applicable — staff work entirely in cloud storage

      - question_id: "7.6"
        prompt: Do backups cover critical cloud or online school data where appropriate?
        help_text: >
          Cloud platforms provide availability but not always backup. A deleted file, corrupted record, or
          ransomware event can propagate through a synced environment. Storing data in Google Drive or
          Microsoft 365 is not the same as having it backed up.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — critical cloud data is backed up
          - Partial — some cloud data backed up
          - "No"
          - Not applicable

      - question_id: "7.7"
        prompt: Is backup success reviewed regularly?
        help_text: Is someone checking that backup jobs are completing successfully — not just assuming they are?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 4
        condition: null
        options:
          - Yes — reviewed regularly (at least weekly)
          - Irregularly — checked occasionally but not on a schedule
          - "No"

      - question_id: "7.7b"
        prompt: Are backups stored onsite, offsite, or both?
        help_text: >
          Offsite or cloud backup protects against physical loss of the building.
          Onsite-only backup is faster to restore but vulnerable to fire, flood, or theft.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Both — onsite and offsite copies maintained
          - Offsite only — stored in cloud or remote location
          - Onsite only — stored at the school
          - Inconsistent — some backups are both, some are only one location

      - question_id: "7.8"
        prompt: Has a restore test been performed and documented within the last 12 months?
        help_text: A backup that has never been tested cannot be relied upon. A restore test confirms that recovery is actually possible.
        answer_type: single_select
        status: core
        skippable: true
        triggers_save: true
        prefill: null
        points: 5
        condition: null
        options:
          - Yes — tested and documented within the last 12 months
          - More than 12 months ago
          - No — never tested

      - question_id: "7.9"
        prompt: How often are restore tests performed?
        help_text: Select the closest match to the actual frequency.
        answer_type: single_select
        status: conditional
        skippable: true
        prefill: null
        points: 3
        condition:
          type: answer_is
          question_id: "7.8"
          value:
            - Yes — tested and documented within the last 12 months
            - More than 12 months ago
        options:
          - Quarterly
          - Twice per year
          - Annually
          - Less than annually
          - Never

      - question_id: "7.10"
        prompt: Is there a defined recovery priority for critical systems?
        help_text: If multiple systems went down at once, is there a documented order for what gets restored first?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — recovery priority is documented
          - Partial — informally understood but not documented
          - "No"

      - question_id: "7.11"
        prompt: Is there a written 1-page incident or disaster response reference for IT operations?
        help_text: A single document someone could pick up during a crisis that tells them who to call, what to check first, and how to communicate. One page is enough — it just needs to exist and be findable.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — written reference exists
          - Partial — informal notes or partial documentation
          - "No"

      - question_id: "7.12"
        prompt: Are critical admin credentials and recovery materials accessible in an emergency?
        help_text: If the primary IT person were unavailable, could another authorized person access the credentials needed to recover systems?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 5
        condition: null
        options:
          - Yes — securely stored and accessible to authorized backup person
          - Partially — some credentials accessible, others not
          - "No"

      - question_id: "7.13"
        prompt: How far back can a backup restore go and still produce data the school could actually use?
        help_text: >
          This is the useful recovery window — not how long data is retained, but how far back a restore
          would produce data that is still relevant and usable.
        answer_type: single_select
        status: core
        skippable: true
        triggers_save: true
        prefill: null
        points: 3
        condition: null
        options:
          - Less than 1 week
          - 1 to 2 weeks
          - 2 to 4 weeks
          - 1 to 3 months
          - More than 3 months

      - question_id: "7.14"
        prompt: Are restore tests performed at least once within every useful recovery window period?
        help_text: >
          If your useful recovery window is 30 days, restore tests should happen at least monthly.
          File-level restore tests count — you do not need to perform full system restores every time.
        answer_type: single_select
        status: conditional
        skippable: true
        prefill: null
        points: 3
        condition:
          type: answer_is
          question_id: "7.13"
          value:
            - Less than 1 week
            - 1 to 2 weeks
            - 2 to 4 weeks
            - 1 to 3 months
            - More than 3 months
        options:
          - "Yes"
          - "No"

# ─────────────────────────────────────────────────────────────────
# SECTION 8: Security Operations, Filtering, and Safeguards (~3 min)
# ─────────────────────────────────────────────────────────────────
  - section_id: "8"
    title: Security Operations, Filtering, and Safeguards
    estimated_minutes: 3
    description: >
      Capture practical security maturity without requiring a full formal audit.
      The emphasis is on baseline hygiene, operational response, and student-facing protections.
    order: 8
    questions:
      - question_id: "8.1"
        prompt: Is endpoint protection deployed on managed devices?
        help_text: >
          Endpoint protection (also known as antivirus or EDR) — is it actively deployed
          on school-managed devices, or just licensed? Deployment means it is installed,
          running, and reporting. This question controls whether the endpoint protection
          follow-up questions appear — save your progress after answering to see them.
        answer_type: single_select
        status: core
        skippable: true
        triggers_save: true
        prefill: null
        points: 5
        is_gate: true
        gate_hides_unconditional: false
        gate_negative_values:
          - "No"
        condition: null
        options:
          - Yes — deployed on most managed devices
          - Partial — deployed on some devices
          - "No"

      - question_id: "8.2"
        prompt: What endpoint protection platform is in use?
        help_text: "e.g. Microsoft Defender for Business, CrowdStrike, Malwarebytes, Sophos, SentinelOne."
        answer_type: short_text
        status: conditional
        skippable: true
        prefill: null
        points: 0
        condition:
          type: answer_is
          question_id: "8.1"
          value:
            - Yes — deployed on most managed devices
            - Partial — deployed on some devices

      - question_id: "8.2b"
        prompt: Is someone actively monitoring notifications and trends from the endpoint protection system?
        help_text: Endpoint protection only helps if someone is watching the alerts. Unreviewed alerts are the same as no alerts.
        answer_type: single_select
        status: conditional
        skippable: true
        prefill: null
        points: 2
        condition:
          type: answer_is
          question_id: "8.1"
          value:
            - Yes — deployed on most managed devices
            - Partial — deployed on some devices
        options:
          - Yes — alerts and trends are reviewed regularly
          - Sometimes — reviewed occasionally but not consistently
          - "No"
          - Endpoint protection does not notify us centrally

      - question_id: "8.3"
        prompt: Is patching for endpoints and servers managed on a defined schedule and timeframe?
        help_text: >
          A scheduled process for applying security updates, including a defined window for applying
          critical out-of-cycle patches when important updates are released outside normal schedules —
          not just when something breaks or when there is time.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — documented patching schedule with defined response windows
          - Informal — patching happens but not on a defined schedule
          - "No"

      - question_id: "8.4"
        prompt: Are critical network and security devices reviewed for firmware currency?
        help_text: Firewalls, switches, and wireless controllers that are running outdated firmware may have known vulnerabilities.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — reviewed regularly (at least twice per year)
          - Irregularly — reviewed occasionally
          - "No"

      - question_id: "8.5"
        prompt: Is a web filter or content filter in place?
        help_text: >
          A filter that blocks harmful, inappropriate, or distracting content for students and/or staff.
          Schools receiving E-rate funding are required to have filtering for students (CIPA).
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 4
        condition: null
        options:
          - Yes — for students and staff
          - Yes — for students only
          - Limited or partial coverage
          - "No"

      - question_id: "8.6"
        prompt: Does the school use a student safety monitoring platform?
        help_text: >
          A platform that monitors student online activity for signals of self-harm, bullying,
          or other behavioral risk. e.g. Bark for Schools, GoGuardian Beacon, Lightspeed Alert, Securly.
          If yes, note the platform in the notes field.
        answer_type: yes_no_unknown
        status: optional
        skippable: true
        prefill: null
        points: 1
        has_notes: true
        condition: null

      - question_id: "8.7"
        prompt: Are filtering, web protection, or student safety controls documented well enough to understand coverage and gaps?
        help_text: Could you explain to a parent or auditor what is filtered, who is covered, and what the exceptions process is?
        answer_type: single_select
        status: optional
        skippable: true
        prefill: null
        points: 1
        condition: null
        options:
          - Yes — controls are documented
          - Partial — some documentation exists
          - "No"

      - question_id: "8.8"
        prompt: Is there a documented process for responding to suspicious activity, malware, or account compromise?
        help_text: A reference document someone could use during an incident — who to notify, how to contain the problem, how to communicate. A one-page guide counts.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 4
        condition: null
        options:
          - Yes — documented process exists
          - Partial — informal notes or partial documentation
          - "No"

      - question_id: "8.9"
        prompt: Are logs or alerts from key systems reviewed by someone?
        help_text: Authentication logs, firewall alerts, endpoint protection alerts — is someone actually looking at these on a regular basis?
        answer_type: single_select
        status: optional
        skippable: true
        prefill: null
        points: 2
        condition: null
        options:
          - Yes — reviewed regularly
          - Sometimes — reviewed occasionally
          - "No"

      - question_id: "8.10"
        prompt: Does the school carry cyber insurance?
        help_text: A cyber liability policy that covers costs related to data breaches, ransomware, or other cyber incidents.
        answer_type: single_select
        status: optional
        skippable: true
        triggers_save: true
        prefill: null
        points: 1
        condition: null
        options:
          - "Yes"
          - "No"

      - question_id: "8.10b"
        prompt: Do you have a copy of the cyber insurance policy on file?
        help_text: Having the policy accessible means you can reference coverage details and requirements during an incident.
        answer_type: single_select
        status: conditional
        skippable: true
        prefill: null
        points: 1
        condition:
          type: answer_is
          question_id: "8.10"
          value: "Yes"
        options:
          - "Yes"
          - "No"

      - question_id: "8.10c"
        prompt: Does your incident response plan conform to the requirements of your cyber insurance policy?
        help_text: Many policies require specific steps to be taken during an incident. Failing to follow them can void coverage.
        answer_type: single_select
        status: conditional
        skippable: true
        prefill: null
        points: 2
        condition:
          type: answer_is
          question_id: "8.10"
          value: "Yes"
        options:
          - Yes — our response steps match the policy requirements
          - Partial — some of our steps match their requirements
          - "No"
          - I don't know

      - question_id: "8.11"
        inverted: true
        prompt: Are there known unresolved security concerns today?
        help_text: >
          Active issues you are already aware of — not hypothetical risks.
          Note: identifying a known problem scores better than not knowing,
          because you cannot fix what you are not aware of. If yes, describe briefly in the notes field.
        answer_type: yes_no_unknown
        status: core
        skippable: true
        prefill: null
        points: 4
        has_notes: true
        condition: null

# ─────────────────────────────────────────────────────────────────
# SECTION 9: Documentation and Operational Readiness (~2 min)
# ─────────────────────────────────────────────────────────────────
  - section_id: "9"
    title: Documentation and Operational Readiness
    estimated_minutes: 2
    description: >
      Measure whether the environment is understandable and supportable by more than one person.
    order: 9
    questions:
      - question_id: "9.1"
        prompt: Is there a central location where IT documentation is stored?
        help_text: A wiki, shared drive folder, IT documentation platform, or similar. If yes, is it actually used?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 4
        condition: null
        options:
          - Yes — well used and reasonably complete
          - Yes — but used inconsistently
          - "No"

      - question_id: "9.2"
        prompt: Are network, systems, and vendor documents kept in a reasonably current state?
        help_text: Are the documents you have actually accurate, or are they out of date enough to be misleading?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 4
        condition: null
        options:
          - Yes — most documentation is current
          - Partly — some is current, some is outdated
          - No — documentation is generally outdated

      - question_id: "9.3"
        prompt: Are standard operating procedures documented for common recurring tasks?
        help_text: >
          Step-by-step guides for tasks like setting up a new device, resetting a password,
          adding a new staff account, or troubleshooting a printer. Even basic SOPs reduce key-person dependency.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 4
        condition: null
        options:
          - Yes — SOPs exist for most recurring tasks
          - Partial — some tasks are documented
          - "No"

      - question_id: "9.4"
        prompt: Is there a known process for documenting changes after projects or incidents?
        help_text: When something changes in the environment — a new device, a configuration change, a resolved incident — does documentation get updated?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 3
        condition: null
        options:
          - Yes — changes are documented as part of the process
          - Informal — sometimes documented, sometimes not
          - "No"

      - question_id: "9.5"
        prompt: Could a qualified third party understand the environment from existing documentation?
        help_text: If a new IT person or external consultant arrived today, could they understand how the environment is built and how to support it?
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 5
        condition: null
        options:
          - Yes — documentation is sufficient for a qualified person to get oriented
          - Partially — they could understand some areas but not others
          - No — the environment is not understandable from documentation alone

      - question_id: "9.6"
        inverted: true
        prompt: Are there major knowledge areas that currently live only in one person's head?
        help_text: >
          Things only one person knows how to do — configure the firewall, manage the phone system,
          reset the backup service. Identifying these is the first step to addressing them.
          If yes, list the areas in the notes field.
        answer_type: yes_no_unknown
        status: core
        skippable: true
        prefill: null
        points: 4
        has_notes: true
        condition: null

# ─────────────────────────────────────────────────────────────────
# SECTION 10: Near-Term Priorities and Planning Inputs (~5 min)
# ─────────────────────────────────────────────────────────────────
  - section_id: "10"
    title: Near-Term Priorities and Planning Inputs
    estimated_minutes: 5
    description: >
      Capture what you already know needs attention and any context that helps
      sequence the action plan. This section does not generate a score —
      it calibrates and contextualizes the recommendations from all other sections.
    order: 10
    questions:
      - question_id: "10.1"
        prompt: List up to five known IT problems or projects you already know need attention
        help_text: >
          Things already on your radar — independent of what this assessment surfaces.
          One item per line, up to five items.
        answer_type: list_of_items
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "10.2"
        prompt: Are there IT projects or initiatives already approved or planned for the next 12 months?
        help_text: Projects that are already funded, committed, or in progress. One item per line.
        answer_type: list_of_items
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "10.3"
        prompt: Are there known deadlines, audits, renewals, or compliance events coming up that IT needs to be ready for?
        help_text: "e.g. E-rate filing deadline, accreditation visit, major contract renewal, state audit. One item per line."
        answer_type: list_of_items
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "10.4"
        prompt: What changes are expected before the next school year?
        help_text: New grade levels, new campuses, staff changes, major device rollouts, infrastructure projects, or anything else IT needs to plan for.
        answer_type: long_text
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "10.5"
        prompt: Is leadership or administration expecting a budget, refresh, or improvement plan from IT in the near future?
        help_text: If yes, note the deadline or context in the notes field. This will be highlighted in the roadmap section of the report.
        answer_type: yes_no_unknown
        status: core
        skippable: true
        prefill: null
        points: 0
        has_notes: true
        condition: null

      - question_id: "10.6"
        prompt: Are there known obstacles, constraints, or dependencies that will affect IT's ability to act on findings from this assessment?
        help_text: Budget freezes, staffing gaps, vendor dependencies, upcoming disruptions. These will be noted in the action plan so recommendations reflect reality.
        answer_type: long_text
        status: optional
        skippable: true
        prefill: null
        points: 0
        condition: null

      - question_id: "10.7"
        prompt: Overall, how confident are you in the accuracy of the information you provided across this assessment?
        help_text: This affects how findings are weighted and presented. There is no penalty for lower confidence — honest uncertainty is more useful than false precision.
        answer_type: single_select
        status: core
        skippable: true
        prefill: null
        points: 0
        condition: null
        options:
          - High — most answers are documented or verified
          - Moderate — most answers are based on recall or staff reports
          - Low — many answers were estimated or unknown
          - Mixed — confidence varies significantly by section

      - question_id: "10.8"
        prompt: Are there specific sections or topic areas where you feel the data provided was particularly incomplete or uncertain?
        help_text: These sections will receive an additional uncertainty annotation in the report. One area per line.
        answer_type: list_of_items
        status: optional
        skippable: true
        prefill: null
        points: 0
        condition: null
